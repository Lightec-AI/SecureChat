appId: ai.lightec.securechat.desktop
productName: SecureChat
directories:
  output: dist
  buildResources: build
files:
  - electron/**/*
mac:
  target:
    - dmg
    - zip
win:
  target:
    - nsis
    - portable
linux:
  maintainer: Lightec AI <support@lightec.ai>
  executableName: securechat
  artifactName: "${name}-${version}-${arch}.${ext}"
  target:
    - AppImage
    - deb
